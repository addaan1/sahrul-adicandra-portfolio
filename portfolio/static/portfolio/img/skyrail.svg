<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
<title id="title">Celestial sky rail</title><desc id="desc">A futuristic train travels along a floating circular railway above clouds and data constellations.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#183b57"/><stop offset=".48" stop-color="#0f273d"/><stop offset="1" stop-color="#0a1726"/></linearGradient>
  <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#65e7df"/><stop offset=".5" stop-color="#f2d27f"/><stop offset="1" stop-color="#7f8bff"/></linearGradient>
  <linearGradient id="train" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f6fffd"/><stop offset=".4" stop-color="#a9f2e6"/><stop offset="1" stop-color="#54b5c1"/></linearGradient>
  <linearGradient id="island" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#6ea89b"/><stop offset=".45" stop-color="#315565"/><stop offset="1" stop-color="#102236"/></linearGradient>
  <radialGradient id="glow"><stop stop-color="#73e6dc" stop-opacity=".7"/><stop offset="1" stop-color="#73e6dc" stop-opacity="0"/></radialGradient>
  <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#020812" flood-opacity=".45"/></filter>
</defs>
